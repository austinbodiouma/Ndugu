$kind: http-request
name: Get Profile - Invalid Token (Negative Test)
method: GET
url: '{{baseUrl}}/api/profile'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer invalid.token.here'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 401 Unauthorized with invalid token", function () {
          pm.response.to.have.status(401);
      });
