$kind: http-request
name: Register - Duplicate Phone (Negative Test)
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phone": "+1234567890",
      "email": "duplicate@example.com",
      "fullName": "Duplicate User",
      "password": "Password123!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400 Bad Request for duplicate registration", function () {
          pm.response.to.have.status(400);
      });
