$kind: http-request
name: Verify OTP - Invalid OTP (Negative Test)
method: POST
url: '{{baseUrl}}/api/auth/verify-otp'
order: 8000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "otp": "000000"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400 for invalid OTP", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Response body indicates invalid OTP", function () {
          pm.expect(pm.response.text()).to.include("Invalid OTP");
      });
