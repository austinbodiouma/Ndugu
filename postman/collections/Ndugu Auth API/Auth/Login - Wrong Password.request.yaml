$kind: http-request
name: Login - Wrong Password (Negative Test)
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "phone": "+1234567890",
      "password": "WrongPassword!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 401 Unauthorized for wrong password", function () {
          pm.response.to.have.status(401);
      });

      pm.test("Response body indicates invalid credentials", function () {
          pm.expect(pm.response.text()).to.include("Invalid credentials");
      });
